---
- name: Cisco Manual Configuration Portal (DNAC Style)
  hosts: R1
  gather_facts: no
  connection: network_cli
  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    - name: Execute Manual CLI Input
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop: "{{ manual_cli_input.split('\n') }}"
      register: command_results
      when: manual_cli_input | length > 0

    - name: Display Router Output
      ansible.builtin.debug:
        msg: |
          ------------------------------------------------
          DEVICE: {{ inventory_hostname }}
          ------------------------------------------------
          {% for result in command_results.results %}
          COMMAND: {{ result.item }}
          OUTPUT:
          {{ result.stdout }}
          ------------------------------------------------
          {% endfor %}
      when: manual_cli_input | length > 0
