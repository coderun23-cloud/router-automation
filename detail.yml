---
- name: Network Operation - Manual Configuration Entry
  hosts: Router1
  gather_facts: no
  connection: network_cli
  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    - name: 1. Apply User Provided Configuration
      cisco.ios.ios_config:
        lines: "{{ manual_config_commands.split('\n') }}"
      register: config_output
      when: manual_config_commands is defined and manual_config_commands | length > 0

    - name: 2. Generate Insight Report
      ansible.builtin.set_fact:
        report_lines:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║                CONFIGURATION CHANGE REPORT                   ║"
          - "╠══════════════════════════════════════════════════════════════╣"
          - "  DEVICE: {{ inventory_hostname }}"
          - "  STATUS: {% if config_output.changed %}CHANGES APPLIED{% else %}NO CHANGES MADE{% endif %}"
          - "----------------------------------------------------------------"
          - "  COMMANDS EXECUTED:"
          - "{{ manual_config_commands }}"
          - "----------------------------------------------------------------"
          - "  DEVICE RESPONSE:"
          - "{{ config_output.updates | default(['No updates performed']) | join('\n') }}"
          - "╚══════════════════════════════════════════════════════════════╝"

    - name: 3. Display Final Report
      ansible.builtin.debug:
        msg: "{{ report_lines }}"