---
- name: Cisco Manual Configuration Portal (DNAC Style)
  hosts: R1
  gather_facts: no
  connection: network_cli
  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    - name: Apply Manual CLI Configuration
      ansible.netcommon.cli_config:
        config: "{{ manual_cli_input }}"
      register: result
      when: manual_cli_input | length > 0

    - name: Summary of Changes
      ansible.builtin.debug:
        msg: 
          - "------------------------------------------------"
          - "DEVICE: {{ inventory_hostname }}"
          - "COMMANDS SENT:"
          - "{{ manual_cli_input }}"
          - "------------------------------------------------"
          - "ROUTER RESPONSE:"
          - "{{ result.updates if result.changed else 'No changes required/applied' }}"
