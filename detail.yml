---
- name: Cisco Manual SSH Portal (DNAC Style)
  hosts: R1
  gather_facts: no
  connection: network_cli
  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    - name: 1. Execute Manual CLI Input
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      # 'select' filter removes the empty lines from the survey input
      loop: "{{ manual_ssh_input.split('\n') | select('regex', '\\S') | list }}"
      register: ssh_results
      when: manual_ssh_input is defined and manual_ssh_input | length > 0

    - name: 2. View Console Output
      ansible.builtin.debug:
        msg: |
          ========= [ SSH SESSION CONSOLE ] =========
          DEVICE: {{ inventory_hostname }}
          {% for result in ssh_results.results %}
          
          > {{ result.item }}
          {{ result.stdout }}
          {% endfor %}
          ===========================================
      when: ssh_results is defined
